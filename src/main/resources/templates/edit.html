<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-sm border-0 rounded-4 p-4">
                    <h3 class="mb-4">Edit Task</h3>

                    <form th:action="@{/tasks/save}" th:object="${task}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" th:field="*{title}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Deadline</label>
                            <input type="date" class="form-control" th:field="*{deadline}" required>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" th:field="*{completed}" id="completed">
                            <label class="form-check-label" for="completed">Completed</label>
                        </div>

                        <button class="btn btn-primary" type="submit">Update</button>
                        <a href="/tasks" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
