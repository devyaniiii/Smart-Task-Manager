<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .gradient-header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
        }

        .task-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .badge-status {
            font-size: 0.8rem;
            padding: 0.5rem 0.75rem;
        }

        .table thead th {
            background: #eef2ff;
            border-bottom: none;
        }

        .action-btns form {
            display: inline-block;
            margin-right: 6px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark gradient-header shadow-sm">
        <div class="container py-2">
            <a class="navbar-brand fw-bold" href="/tasks">Smart Task Manager</a>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card task-card p-4">
                    <h4 class="mb-3">Create Task</h4>
                    <form th:action="@{/tasks/save}" th:object="${task}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" th:field="*{title}" placeholder="Enter task title"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="4"
                                placeholder="Task details"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Deadline</label>
                            <input type="date" class="form-control" th:field="*{deadline}" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Save Task</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card task-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <h4 class="mb-0">Tasks</h4>
                        <form method="get" action="/tasks">
                            <select class="form-select" name="status" onchange="this.form.submit()">
                                <option value="all" th:selected="${status == 'all'}">All</option>
                                <option value="pending" th:selected="${status == 'pending'}">Pending</option>
                                <option value="completed" th:selected="${status == 'completed'}">Completed</option>
                            </select>
                        </form>
                    </div>

                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Deadline</th>
                                    <th>Status</th>
                                    <th style="width: 240px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="t : ${tasks}">
                                    <td>
                                        <div class="fw-semibold" th:text="${t.title}"></div>
                                        <small class="text-muted" th:text="${t.description}"></small>
                                    </td>
                                    <td th:text="${t.deadline}"></td>
                                    <td>
                                        <span class="badge rounded-pill badge-status"
                                            th:classappend="${t.completed} ? ' text-bg-success' : ' text-bg-warning'"
                                            th:text="${t.completed ? 'Completed' : 'Pending'}"></span>
                                    </td>
                                    <td class="action-btns">
                                        <form th:action="@{'/tasks/' + ${t.id} + '/toggle'}" method="post">
                                            <button type="submit" class="btn btn-sm btn-outline-primary">
                                                Toggle
                                            </button>
                                        </form>

                                        <a th:href="@{'/tasks/edit/' + ${t.id}}" class="btn btn-sm btn-outline-success">
                                            Edit
                                        </a>

                                        <form th:action="@{'/tasks/' + ${t.id} + '/delete'}" method="post">
                                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Delete this task?')">
                                                Delete
                                            </button>
                                        </form>
                                    </td>
                                </tr>

                                <tr th:if="${#lists.isEmpty(tasks)}">
                                    <td colspan="4" class="text-center text-muted py-4">No tasks found</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
